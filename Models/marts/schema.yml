version: 2

models:
  - name: fct_streams
    description: Core fact table - one row per stream event
    columns:
      - name: stream_id
        description: Unique stream identifier
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: artist_id
        tests:
          - not_null

  - name: dim_users
    description: User dimension table
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_artists
    description: Artist dimension table
    columns:
      - name: artist_id
        tests:
          - unique
          - not_null